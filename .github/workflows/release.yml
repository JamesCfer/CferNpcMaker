name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from module.json
        id: version
        run: echo "version=$(jq -r .version module.json)" >> $GITHUB_OUTPUT

      - name: Build module zips
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE_URL="https://github.com/JamesCfer/CferNpcMaker/releases/download/v${VERSION}"

          # --- DnD5eNpcMaker ---
          mkdir -p DnD5eNpcMaker
          jq --arg base "$BASE_URL" '
            .id = "DnD5eNpcMaker" |
            .title = "DnD 5e NPC Auto-Builder" |
            .description = "Generate D&D 5e NPCs from feats, spells, actions, and equipment. Optionally export them or upload via the Foundry REST API." |
            .systems = ["dnd5e"] |
            .manifest = ($base + "/dnd5e-module.json") |
            .download = ($base + "/DnD5eNpcMaker.zip")
          ' module.json > DnD5eNpcMaker/module.json
          cp -r scripts styles templates README.md DnD5eNpcMaker/
          zip -r DnD5eNpcMaker.zip DnD5eNpcMaker/
          cp DnD5eNpcMaker/module.json dnd5e-module.json

          # --- Pf2eNpcMaker ---
          mkdir -p Pf2eNpcMaker
          jq --arg base "$BASE_URL" '
            .id = "Pf2eNpcMaker" |
            .title = "PF2E NPC Auto-Builder" |
            .description = "Generate Pathfinder 2e NPCs from feats, spells, actions, and equipment. Optionally export them or upload via the Foundry REST API." |
            .systems = ["pf2e"] |
            .manifest = ($base + "/pf2e-module.json") |
            .download = ($base + "/Pf2eNpcMaker.zip")
          ' module.json > Pf2eNpcMaker/module.json
          cp -r scripts styles templates README.md Pf2eNpcMaker/
          zip -r Pf2eNpcMaker.zip Pf2eNpcMaker/
          cp Pf2eNpcMaker/module.json pf2e-module.json

          # --- Hero6NpcMaker ---
          mkdir -p Hero6NpcMaker
          jq --arg base "$BASE_URL" '
            .id = "Hero6NpcMaker" |
            .title = "Hero 6e NPC Auto-Builder" |
            .description = "Generate Hero System 6e NPCs from feats, spells, actions, and equipment. Optionally export them or upload via the Foundry REST API." |
            .systems = ["hero6e"] |
            .manifest = ($base + "/hero6-module.json") |
            .download = ($base + "/Hero6NpcMaker.zip")
          ' module.json > Hero6NpcMaker/module.json
          cp -r scripts styles templates README.md Hero6NpcMaker/
          zip -r Hero6NpcMaker.zip Hero6NpcMaker/
          cp Hero6NpcMaker/module.json hero6-module.json

      - name: Create GitHub Release and upload assets
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { repo, owner } = context.repo;
            const version = '${{ steps.version.outputs.version }}';
            const tag = `v${version}`;

            let release;
            try {
              const res = await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag,
                name: tag,
                body: `Release ${tag}`,
                draft: false,
                prerelease: false,
              });
              release = res.data;
            } catch (e) {
              if (e.status === 422) {
                const list = await github.rest.repos.listReleases({ owner, repo });
                release = list.data.find(r => r.tag_name === tag);
                if (!release) throw new Error(`Tag ${tag} exists but release not found`);
                for (const asset of release.assets) {
                  await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
                }
              } else {
                throw e;
              }
            }

            const assets = [
              'dnd5e-module.json',
              'pf2e-module.json',
              'hero6-module.json',
              'DnD5eNpcMaker.zip',
              'Pf2eNpcMaker.zip',
              'Hero6NpcMaker.zip',
            ];

            for (const name of assets) {
              await github.rest.repos.uploadReleaseAsset({
                owner, repo,
                release_id: release.id,
                name,
                data: fs.readFileSync(name),
              });
            }

      # PF2E PACKAGE RELEASE
      - name: Notify Foundry PF2e Package
        env:
          FOUNDRYVTT_RELEASE_TOKEN: ${{ secrets.FOUNDRYVTT_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://foundryvtt.com/_api/packages/release_version/ \
            -H "Content-Type: application/json" \
            -H "Authorization: ${FOUNDRYVTT_RELEASE_TOKEN}" \
            -d "{
              \"id\": \"Pf2eNpcMaker\",
              \"dry-run\": false,
              \"release\": {
                \"version\": \"${VERSION}\",
                \"manifest\": \"https://github.com/JamesCfer/CferNpcMaker/releases/download/v${VERSION}/pf2e-module.json\",
                \"notes\": \"https://github.com/JamesCfer/CferNpcMaker/releases/tag/v${VERSION}\",
                \"compatibility\": {
                  \"minimum\": \"13\",
                  \"verified\": \"13\"
                }
              }
            }")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Foundry VTT API returned HTTP $HTTP_CODE"
            exit 1
          fi

      # DND5E PACKAGE RELEASE
      - name: Notify Foundry DnD5e Package
        env:
          FOUNDRYVTT_DND5E_RELEASE_TOKEN: ${{ secrets.FOUNDRYVTT_DND5E_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://foundryvtt.com/_api/packages/release_version/ \
            -H "Content-Type: application/json" \
            -H "Authorization: ${FOUNDRYVTT_DND5E_RELEASE_TOKEN}" \
            -d "{
              \"id\": \"DnD5eNpcMaker\",
              \"dry-run\": false,
              \"release\": {
                \"version\": \"${VERSION}\",
                \"manifest\": \"https://github.com/JamesCfer/CferNpcMaker/releases/download/v${VERSION}/dnd5e-module.json\",
                \"notes\": \"https://github.com/JamesCfer/CferNpcMaker/releases/tag/v${VERSION}\",
                \"compatibility\": {
                  \"minimum\": \"13\",
                  \"verified\": \"13\"
                }
              }
            }")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Foundry VTT API returned HTTP $HTTP_CODE"
            exit 1
          fi
