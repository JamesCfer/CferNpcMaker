name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from module.json
        id: version
        run: echo "version=$(jq -r .version module.json)" >> $GITHUB_OUTPUT

      - name: Build module packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="https://github.com/JamesCfer/CferNpcMaker"

          # Helper: build a module.json and zip for a given module
          build_module() {
            local NAME="$1"
            local TITLE="$2"
            local SYSTEM="$3"
            local DESC="$4"

            # Generate module.json
            jq \
              --arg id    "$NAME" \
              --arg title "$TITLE" \
              --arg sys   "$SYSTEM" \
              --arg desc  "$DESC" \
              --arg mf    "${REPO}/releases/latest/download/${NAME}-module.json" \
              --arg dl    "${REPO}/releases/latest/download/${NAME}.zip" \
              '.id=$id | .title=$title | .systems=[$sys] | .description=$desc | .manifest=$mf | .download=$dl' \
              module.json > "${NAME}-module.json"

            # Build zip with module folder
            mkdir -p "${NAME}"
            cp "${NAME}-module.json" "${NAME}/module.json"
            cp -r scripts styles templates README.md "${NAME}/"
            zip -r "${NAME}.zip" "${NAME}/"
            rm -rf "${NAME}"
          }

          build_module \
            "DnD5eNpcMaker" \
            "DnD5e NPC Auto-Builder" \
            "dnd5e" \
            "Generate Dungeons & Dragons 5e NPCs from feats, spells, actions, and equipment. Optionally export them or upload via the Foundry REST API."

          build_module \
            "Pf2eNpcMaker" \
            "PF2E NPC Auto-Builder" \
            "pf2e" \
            "Generate Pathfinder 2e NPCs from feats, spells, actions, and equipment. Optionally export them or upload via the Foundry REST API."

          build_module \
            "Hero6NpcMaker" \
            "Hero6 NPC Auto-Builder" \
            "hero6e" \
            "Generate Hero System 6th Edition NPCs from feats, spells, actions, and equipment. Optionally export them or upload via the Foundry REST API."

      - name: Create GitHub Release and upload assets
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { repo, owner } = context.repo;
            const version = '${{ steps.version.outputs.version }}';
            const tag = `v${version}`;

            const modules = ['DnD5eNpcMaker', 'Pf2eNpcMaker', 'Hero6NpcMaker'];

            let release;
            try {
              const res = await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag,
                name: tag,
                body: `Release ${tag}`,
                draft: false,
                prerelease: false,
              });
              release = res.data;
            } catch (e) {
              if (e.status === 422) {
                const list = await github.rest.repos.listReleases({ owner, repo });
                release = list.data.find(r => r.tag_name === tag);
                if (!release) throw new Error(`Tag ${tag} exists but release not found`);
                for (const asset of release.assets) {
                  await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
                }
              } else {
                throw e;
              }
            }

            for (const name of modules) {
              await github.rest.repos.uploadReleaseAsset({
                owner, repo,
                release_id: release.id,
                name: `${name}-module.json`,
                data: fs.readFileSync(`${name}-module.json`),
              });

              await github.rest.repos.uploadReleaseAsset({
                owner, repo,
                release_id: release.id,
                name: `${name}.zip`,
                data: fs.readFileSync(`${name}.zip`),
              });
            }

      # PF2E PACKAGE RELEASE
      - name: Notify Foundry PF2e Package
        env:
          FOUNDRYVTT_RELEASE_TOKEN: ${{ secrets.FOUNDRYVTT_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://foundryvtt.com/_api/packages/release_version/ \
            -H "Content-Type: application/json" \
            -H "Authorization: ${FOUNDRYVTT_RELEASE_TOKEN}" \
            -d "{
              \"id\": \"Pf2eNpcMaker\",
              \"dry-run\": false,
              \"release\": {
                \"version\": \"${VERSION}\",
                \"manifest\": \"https://github.com/JamesCfer/CferNpcMaker/releases/download/v${VERSION}/Pf2eNpcMaker-module.json\",
                \"notes\": \"https://github.com/JamesCfer/CferNpcMaker/releases/tag/v${VERSION}\",
                \"compatibility\": {
                  \"minimum\": \"13\",
                  \"verified\": \"13\"
                }
              }
            }")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Foundry VTT API returned HTTP $HTTP_CODE"
            exit 1
          fi

      # DND5E PACKAGE RELEASE
      - name: Notify Foundry DnD5e Package
        env:
          FOUNDRYVTT_DND5E_RELEASE_TOKEN: ${{ secrets.FOUNDRYVTT_DND5E_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://foundryvtt.com/_api/packages/release_version/ \
            -H "Content-Type: application/json" \
            -H "Authorization: ${FOUNDRYVTT_DND5E_RELEASE_TOKEN}" \
            -d "{
              \"id\": \"DnD5eNpcMaker\",
              \"dry-run\": false,
              \"release\": {
                \"version\": \"${VERSION}\",
                \"manifest\": \"https://github.com/JamesCfer/CferNpcMaker/releases/download/v${VERSION}/DnD5eNpcMaker-module.json\",
                \"notes\": \"https://github.com/JamesCfer/CferNpcMaker/releases/tag/v${VERSION}\",
                \"compatibility\": {
                  \"minimum\": \"13\",
                  \"verified\": \"13\"
                }
              }
            }")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Foundry VTT API returned HTTP $HTTP_CODE"
            exit 1
          fi
