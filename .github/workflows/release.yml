name: Release
on:
  push:
    branches:
      - main
    paths:
      - 'version.json'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from version.json
        id: version
        run: echo "version=$(jq -r .version version.json)" >> $GITHUB_OUTPUT

      - name: Build module packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          PF2E_BASE="https://github.com/JamesCfer/Pf2eNpcMaker/releases/download"
          DND5E_BASE="https://github.com/JamesCfer/DnD5eNpcMaker/releases/download"
          HERO6E_BASE="https://github.com/JamesCfer/Hero6eNpcMaker/releases/download"

          # --- Pf2eNpcMaker ---
          mkdir -p Pf2eNpcMaker
          jq \
            --arg version  "$VERSION" \
            --arg manifest "${PF2E_BASE}/latest/module.json" \
            --arg download "${PF2E_BASE}/latest/Pf2eNpcMaker.zip" \
            '.version=$version | .manifest=$manifest | .download=$download' \
            pf2e-module.json > Pf2eNpcMaker/module.json
          cp -r scripts styles templates README.md Pf2eNpcMaker/
          zip -r Pf2eNpcMaker.zip Pf2eNpcMaker/

          # --- DnD5eNpcMaker ---
          mkdir -p DnD5eNpcMaker
          jq \
            --arg version  "$VERSION" \
            --arg manifest "${DND5E_BASE}/latest/module.json" \
            --arg download "${DND5E_BASE}/latest/DnD5eNpcMaker.zip" \
            '.version=$version | .manifest=$manifest | .download=$download' \
            dnd5e-module.json > DnD5eNpcMaker/module.json
          cp -r scripts styles templates README.md DnD5eNpcMaker/
          zip -r DnD5eNpcMaker.zip DnD5eNpcMaker/

          # --- Hero6eNpcMaker ---
          mkdir -p Hero6eNpcMaker
          jq \
            --arg version  "$VERSION" \
            --arg manifest "${HERO6E_BASE}/latest/module.json" \
            --arg download "${HERO6E_BASE}/latest/Hero6eNpcMaker.zip" \
            '.version=$version | .manifest=$manifest | .download=$download' \
            hero6-module.json > Hero6eNpcMaker/module.json
          cp -r scripts styles templates README.md Hero6eNpcMaker/
          zip -r Hero6eNpcMaker.zip Hero6eNpcMaker/

      # ── Push source to each individual repo ──────────────────────────────

      - name: Push source to Pf2eNpcMaker
        env:
          MODULES_PAT: ${{ secrets.MODULES_RELEASE_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git clone https://x-access-token:${MODULES_PAT}@github.com/JamesCfer/Pf2eNpcMaker.git _pf2e_repo
          rsync -a --delete Pf2eNpcMaker/ _pf2e_repo/
          cd _pf2e_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Release v${VERSION}"
          git push

      - name: Push source to DnD5eNpcMaker
        env:
          MODULES_PAT: ${{ secrets.MODULES_RELEASE_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git clone https://x-access-token:${MODULES_PAT}@github.com/JamesCfer/DnD5eNpcMaker.git _dnd5e_repo
          rsync -a --delete DnD5eNpcMaker/ _dnd5e_repo/
          cd _dnd5e_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Release v${VERSION}"
          git push

      - name: Push source to Hero6eNpcMaker
        env:
          MODULES_PAT: ${{ secrets.MODULES_RELEASE_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git clone https://x-access-token:${MODULES_PAT}@github.com/JamesCfer/Hero6eNpcMaker.git _hero6e_repo
          rsync -a --delete Hero6eNpcMaker/ _hero6e_repo/
          cd _hero6e_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Release v${VERSION}"
          git push

      # ── Create versioned releases in each individual repo ────────────────

      - name: Create Pf2eNpcMaker versioned release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MODULES_RELEASE_PAT }}
          script: |
            const fs = require('fs');
            const owner = 'JamesCfer';
            const repo = 'Pf2eNpcMaker';
            const version = '${{ steps.version.outputs.version }}';
            const tag = `v${version}`;

            let release;
            try {
              release = (await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, name: `v${version}`,
                body: `Pf2eNpcMaker v${version}`, draft: false, prerelease: false,
              })).data;
            } catch (e) {
              if (e.status !== 422) throw e;
              const list = await github.rest.repos.listReleases({ owner, repo });
              release = list.data.find(r => r.tag_name === tag);
              if (!release) throw new Error(`Tag ${tag} exists but release not found`);
              for (const asset of release.assets)
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
            }
            for (const [name, path] of [['module.json', 'Pf2eNpcMaker/module.json'], ['Pf2eNpcMaker.zip', 'Pf2eNpcMaker.zip']])
              await github.rest.repos.uploadReleaseAsset({ owner, repo, release_id: release.id, name, data: fs.readFileSync(path) });

      - name: Create DnD5eNpcMaker versioned release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MODULES_RELEASE_PAT }}
          script: |
            const fs = require('fs');
            const owner = 'JamesCfer';
            const repo = 'DnD5eNpcMaker';
            const version = '${{ steps.version.outputs.version }}';
            const tag = `v${version}`;

            let release;
            try {
              release = (await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, name: `v${version}`,
                body: `DnD5eNpcMaker v${version}`, draft: false, prerelease: false,
              })).data;
            } catch (e) {
              if (e.status !== 422) throw e;
              const list = await github.rest.repos.listReleases({ owner, repo });
              release = list.data.find(r => r.tag_name === tag);
              if (!release) throw new Error(`Tag ${tag} exists but release not found`);
              for (const asset of release.assets)
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
            }
            for (const [name, path] of [['module.json', 'DnD5eNpcMaker/module.json'], ['DnD5eNpcMaker.zip', 'DnD5eNpcMaker.zip']])
              await github.rest.repos.uploadReleaseAsset({ owner, repo, release_id: release.id, name, data: fs.readFileSync(path) });

      - name: Create Hero6eNpcMaker versioned release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MODULES_RELEASE_PAT }}
          script: |
            const fs = require('fs');
            const owner = 'JamesCfer';
            const repo = 'Hero6eNpcMaker';
            const version = '${{ steps.version.outputs.version }}';
            const tag = `v${version}`;

            let release;
            try {
              release = (await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, name: `v${version}`,
                body: `Hero6eNpcMaker v${version}`, draft: false, prerelease: false,
              })).data;
            } catch (e) {
              if (e.status !== 422) throw e;
              const list = await github.rest.repos.listReleases({ owner, repo });
              release = list.data.find(r => r.tag_name === tag);
              if (!release) throw new Error(`Tag ${tag} exists but release not found`);
              for (const asset of release.assets)
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
            }
            for (const [name, path] of [['module.json', 'Hero6eNpcMaker/module.json'], ['Hero6eNpcMaker.zip', 'Hero6eNpcMaker.zip']])
              await github.rest.repos.uploadReleaseAsset({ owner, repo, release_id: release.id, name, data: fs.readFileSync(path) });

      # ── Update floating latest releases in each individual repo ──────────

      - name: Update Pf2eNpcMaker latest release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MODULES_RELEASE_PAT }}
          script: |
            const fs = require('fs');
            const owner = 'JamesCfer';
            const repo = 'Pf2eNpcMaker';
            const tag = 'latest';
            const version = '${{ steps.version.outputs.version }}';

            const list = await github.rest.repos.listReleases({ owner, repo, per_page: 100 });
            let release = list.data.find(r => r.tag_name === tag);
            if (release) {
              for (const asset of release.assets)
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
              await github.rest.repos.updateRelease({
                owner, repo, release_id: release.id,
                name: `latest (v${version})`,
                body: `Always points to the latest release. Current: v${version}`,
              });
            } else {
              release = (await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, name: `latest (v${version})`,
                body: `Always points to the latest release. Current: v${version}`,
                draft: false, prerelease: false,
              })).data;
            }
            for (const [name, path] of [['module.json', 'Pf2eNpcMaker/module.json'], ['Pf2eNpcMaker.zip', 'Pf2eNpcMaker.zip']])
              await github.rest.repos.uploadReleaseAsset({ owner, repo, release_id: release.id, name, data: fs.readFileSync(path) });

      - name: Update DnD5eNpcMaker latest release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MODULES_RELEASE_PAT }}
          script: |
            const fs = require('fs');
            const owner = 'JamesCfer';
            const repo = 'DnD5eNpcMaker';
            const tag = 'latest';
            const version = '${{ steps.version.outputs.version }}';

            const list = await github.rest.repos.listReleases({ owner, repo, per_page: 100 });
            let release = list.data.find(r => r.tag_name === tag);
            if (release) {
              for (const asset of release.assets)
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
              await github.rest.repos.updateRelease({
                owner, repo, release_id: release.id,
                name: `latest (v${version})`,
                body: `Always points to the latest release. Current: v${version}`,
              });
            } else {
              release = (await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, name: `latest (v${version})`,
                body: `Always points to the latest release. Current: v${version}`,
                draft: false, prerelease: false,
              })).data;
            }
            for (const [name, path] of [['module.json', 'DnD5eNpcMaker/module.json'], ['DnD5eNpcMaker.zip', 'DnD5eNpcMaker.zip']])
              await github.rest.repos.uploadReleaseAsset({ owner, repo, release_id: release.id, name, data: fs.readFileSync(path) });

      - name: Update Hero6eNpcMaker latest release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MODULES_RELEASE_PAT }}
          script: |
            const fs = require('fs');
            const owner = 'JamesCfer';
            const repo = 'Hero6eNpcMaker';
            const tag = 'latest';
            const version = '${{ steps.version.outputs.version }}';

            const list = await github.rest.repos.listReleases({ owner, repo, per_page: 100 });
            let release = list.data.find(r => r.tag_name === tag);
            if (release) {
              for (const asset of release.assets)
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
              await github.rest.repos.updateRelease({
                owner, repo, release_id: release.id,
                name: `latest (v${version})`,
                body: `Always points to the latest release. Current: v${version}`,
              });
            } else {
              release = (await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, name: `latest (v${version})`,
                body: `Always points to the latest release. Current: v${version}`,
                draft: false, prerelease: false,
              })).data;
            }
            for (const [name, path] of [['module.json', 'Hero6eNpcMaker/module.json'], ['Hero6eNpcMaker.zip', 'Hero6eNpcMaker.zip']])
              await github.rest.repos.uploadReleaseAsset({ owner, repo, release_id: release.id, name, data: fs.readFileSync(path) });

      # ── Notify Foundry VTT ───────────────────────────────────────────────

      - name: Notify Foundry PF2e Package
        env:
          FOUNDRYVTT_RELEASE_TOKEN: ${{ secrets.FOUNDRYVTT_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://foundryvtt.com/_api/packages/release_version/ \
            -H "Content-Type: application/json" \
            -H "Authorization: ${FOUNDRYVTT_RELEASE_TOKEN}" \
            -d "{
              \"id\": \"Pf2eNpcMaker\",
              \"dry-run\": false,
              \"release\": {
                \"version\": \"${VERSION}\",
                \"manifest\": \"https://github.com/JamesCfer/Pf2eNpcMaker/releases/download/latest/module.json\",
                \"notes\": \"https://github.com/JamesCfer/Pf2eNpcMaker/releases/tag/v${VERSION}\",
                \"compatibility\": {
                  \"minimum\": \"13\",
                  \"verified\": \"13\"
                }
              }
            }")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Foundry VTT API returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Notify Foundry DnD5e Package
        env:
          FOUNDRYVTT_DND5E_RELEASE_TOKEN: ${{ secrets.FOUNDRYVTT_DND5E_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://foundryvtt.com/_api/packages/release_version/ \
            -H "Content-Type: application/json" \
            -H "Authorization: ${FOUNDRYVTT_DND5E_RELEASE_TOKEN}" \
            -d "{
              \"id\": \"DnD5eNpcMaker\",
              \"dry-run\": false,
              \"release\": {
                \"version\": \"${VERSION}\",
                \"manifest\": \"https://github.com/JamesCfer/DnD5eNpcMaker/releases/download/latest/module.json\",
                \"notes\": \"https://github.com/JamesCfer/DnD5eNpcMaker/releases/tag/v${VERSION}\",
                \"compatibility\": {
                  \"minimum\": \"13\",
                  \"verified\": \"13\"
                }
              }
            }")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Foundry VTT API returned HTTP $HTTP_CODE"
            exit 1
          fi
