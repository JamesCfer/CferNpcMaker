name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from version.json
        id: version
        run: echo "version=$(jq -r .version version.json)" >> $GITHUB_OUTPUT

      - name: Build module zips
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE="https://github.com/JamesCfer/CferNpcMaker/releases/download"

          # --- DnD5eNpcMaker ---
          mkdir -p DnD5eNpcMaker
          jq \
            --arg version  "$VERSION" \
            --arg manifest "${BASE}/dnd5e-latest/module.json" \
            --arg download "${BASE}/dnd5e-latest/DnD5eNpcMaker.zip" \
            '.version=$version | .manifest=$manifest | .download=$download' \
            dnd5e-module.json > DnD5eNpcMaker/module.json
          cp -r scripts styles templates README.md DnD5eNpcMaker/
          zip -r DnD5eNpcMaker.zip DnD5eNpcMaker/

          # --- Pf2eNpcMaker ---
          mkdir -p Pf2eNpcMaker
          jq \
            --arg version  "$VERSION" \
            --arg manifest "${BASE}/pf2e-latest/module.json" \
            --arg download "${BASE}/pf2e-latest/Pf2eNpcMaker.zip" \
            '.version=$version | .manifest=$manifest | .download=$download' \
            pf2e-module.json > Pf2eNpcMaker/module.json
          cp -r scripts styles templates README.md Pf2eNpcMaker/
          zip -r Pf2eNpcMaker.zip Pf2eNpcMaker/

          # --- Hero6NpcMaker ---
          mkdir -p Hero6NpcMaker
          jq \
            --arg version  "$VERSION" \
            --arg manifest "${BASE}/hero6-latest/module.json" \
            --arg download "${BASE}/hero6-latest/Hero6NpcMaker.zip" \
            '.version=$version | .manifest=$manifest | .download=$download' \
            hero6-module.json > Hero6NpcMaker/module.json
          cp -r scripts styles templates README.md Hero6NpcMaker/
          zip -r Hero6NpcMaker.zip Hero6NpcMaker/

      - name: Create DnD5e versioned release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { repo, owner } = context.repo;
            const version = '${{ steps.version.outputs.version }}';
            const tag = `dnd5e-v${version}`;

            let release;
            try {
              release = (await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, name: `DnD5eNpcMaker v${version}`,
                body: `DnD5eNpcMaker release v${version}`, draft: false, prerelease: false,
              })).data;
            } catch (e) {
              if (e.status !== 422) throw e;
              const list = await github.rest.repos.listReleases({ owner, repo });
              release = list.data.find(r => r.tag_name === tag);
              if (!release) throw new Error(`Tag ${tag} exists but release not found`);
              for (const asset of release.assets)
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
            }
            for (const [name, path] of [['module.json', 'DnD5eNpcMaker/module.json'], ['DnD5eNpcMaker.zip', 'DnD5eNpcMaker.zip']])
              await github.rest.repos.uploadReleaseAsset({ owner, repo, release_id: release.id, name, data: fs.readFileSync(path) });

      - name: Update DnD5e floating latest release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { repo, owner } = context.repo;
            const tag = 'dnd5e-latest';
            const version = '${{ steps.version.outputs.version }}';

            // Find or create the release without ever deleting it (avoids 404 window)
            const list = await github.rest.repos.listReleases({ owner, repo, per_page: 100 });
            let release = list.data.find(r => r.tag_name === tag);
            if (release) {
              // Delete only the assets, keeping the release live throughout
              for (const asset of release.assets)
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
              await github.rest.repos.updateRelease({
                owner, repo, release_id: release.id,
                name: `DnD5eNpcMaker latest (v${version})`,
                body: `Always points to the latest DnD5eNpcMaker release. Current: v${version}`,
              });
            } else {
              release = (await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, name: `DnD5eNpcMaker latest (v${version})`,
                body: `Always points to the latest DnD5eNpcMaker release. Current: v${version}`,
                draft: false, prerelease: false,
              })).data;
            }
            for (const [name, path] of [['module.json', 'DnD5eNpcMaker/module.json'], ['DnD5eNpcMaker.zip', 'DnD5eNpcMaker.zip']])
              await github.rest.repos.uploadReleaseAsset({ owner, repo, release_id: release.id, name, data: fs.readFileSync(path) });

      - name: Create PF2e versioned release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { repo, owner } = context.repo;
            const version = '${{ steps.version.outputs.version }}';
            const tag = `pf2e-v${version}`;

            let release;
            try {
              release = (await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, name: `Pf2eNpcMaker v${version}`,
                body: `Pf2eNpcMaker release v${version}`, draft: false, prerelease: false,
              })).data;
            } catch (e) {
              if (e.status !== 422) throw e;
              const list = await github.rest.repos.listReleases({ owner, repo });
              release = list.data.find(r => r.tag_name === tag);
              if (!release) throw new Error(`Tag ${tag} exists but release not found`);
              for (const asset of release.assets)
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
            }
            for (const [name, path] of [['module.json', 'Pf2eNpcMaker/module.json'], ['Pf2eNpcMaker.zip', 'Pf2eNpcMaker.zip']])
              await github.rest.repos.uploadReleaseAsset({ owner, repo, release_id: release.id, name, data: fs.readFileSync(path) });

      - name: Update PF2e floating latest release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { repo, owner } = context.repo;
            const tag = 'pf2e-latest';
            const version = '${{ steps.version.outputs.version }}';

            const list = await github.rest.repos.listReleases({ owner, repo, per_page: 100 });
            let release = list.data.find(r => r.tag_name === tag);
            if (release) {
              for (const asset of release.assets)
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
              await github.rest.repos.updateRelease({
                owner, repo, release_id: release.id,
                name: `Pf2eNpcMaker latest (v${version})`,
                body: `Always points to the latest Pf2eNpcMaker release. Current: v${version}`,
              });
            } else {
              release = (await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, name: `Pf2eNpcMaker latest (v${version})`,
                body: `Always points to the latest Pf2eNpcMaker release. Current: v${version}`,
                draft: false, prerelease: false,
              })).data;
            }
            for (const [name, path] of [['module.json', 'Pf2eNpcMaker/module.json'], ['Pf2eNpcMaker.zip', 'Pf2eNpcMaker.zip']])
              await github.rest.repos.uploadReleaseAsset({ owner, repo, release_id: release.id, name, data: fs.readFileSync(path) });

      - name: Create Hero6 versioned release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { repo, owner } = context.repo;
            const version = '${{ steps.version.outputs.version }}';
            const tag = `hero6-v${version}`;

            let release;
            try {
              release = (await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, name: `Hero6NpcMaker v${version}`,
                body: `Hero6NpcMaker release v${version}`, draft: false, prerelease: false,
              })).data;
            } catch (e) {
              if (e.status !== 422) throw e;
              const list = await github.rest.repos.listReleases({ owner, repo });
              release = list.data.find(r => r.tag_name === tag);
              if (!release) throw new Error(`Tag ${tag} exists but release not found`);
              for (const asset of release.assets)
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
            }
            for (const [name, path] of [['module.json', 'Hero6NpcMaker/module.json'], ['Hero6NpcMaker.zip', 'Hero6NpcMaker.zip']])
              await github.rest.repos.uploadReleaseAsset({ owner, repo, release_id: release.id, name, data: fs.readFileSync(path) });

      - name: Update Hero6 floating latest release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { repo, owner } = context.repo;
            const tag = 'hero6-latest';
            const version = '${{ steps.version.outputs.version }}';

            const list = await github.rest.repos.listReleases({ owner, repo, per_page: 100 });
            let release = list.data.find(r => r.tag_name === tag);
            if (release) {
              for (const asset of release.assets)
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
              await github.rest.repos.updateRelease({
                owner, repo, release_id: release.id,
                name: `Hero6NpcMaker latest (v${version})`,
                body: `Always points to the latest Hero6NpcMaker release. Current: v${version}`,
              });
            } else {
              release = (await github.rest.repos.createRelease({
                owner, repo, tag_name: tag, name: `Hero6NpcMaker latest (v${version})`,
                body: `Always points to the latest Hero6NpcMaker release. Current: v${version}`,
                draft: false, prerelease: false,
              })).data;
            }
            for (const [name, path] of [['module.json', 'Hero6NpcMaker/module.json'], ['Hero6NpcMaker.zip', 'Hero6NpcMaker.zip']])
              await github.rest.repos.uploadReleaseAsset({ owner, repo, release_id: release.id, name, data: fs.readFileSync(path) });

      # PF2E PACKAGE RELEASE
      - name: Notify Foundry PF2e Package
        env:
          FOUNDRYVTT_RELEASE_TOKEN: ${{ secrets.FOUNDRYVTT_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://foundryvtt.com/_api/packages/release_version/ \
            -H "Content-Type: application/json" \
            -H "Authorization: ${FOUNDRYVTT_RELEASE_TOKEN}" \
            -d "{
              \"id\": \"Pf2eNpcMaker\",
              \"dry-run\": false,
              \"release\": {
                \"version\": \"${VERSION}\",
                \"manifest\": \"https://github.com/JamesCfer/CferNpcMaker/releases/download/pf2e-latest/module.json\",
                \"notes\": \"https://github.com/JamesCfer/CferNpcMaker/releases/tag/pf2e-v${VERSION}\",
                \"compatibility\": {
                  \"minimum\": \"13\",
                  \"verified\": \"13\"
                }
              }
            }")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Foundry VTT API returned HTTP $HTTP_CODE"
            exit 1
          fi

      # DND5E PACKAGE RELEASE
      - name: Notify Foundry DnD5e Package
        env:
          FOUNDRYVTT_DND5E_RELEASE_TOKEN: ${{ secrets.FOUNDRYVTT_DND5E_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://foundryvtt.com/_api/packages/release_version/ \
            -H "Content-Type: application/json" \
            -H "Authorization: ${FOUNDRYVTT_DND5E_RELEASE_TOKEN}" \
            -d "{
              \"id\": \"DnD5eNpcMaker\",
              \"dry-run\": false,
              \"release\": {
                \"version\": \"${VERSION}\",
                \"manifest\": \"https://github.com/JamesCfer/CferNpcMaker/releases/download/dnd5e-latest/module.json\",
                \"notes\": \"https://github.com/JamesCfer/CferNpcMaker/releases/tag/dnd5e-v${VERSION}\",
                \"compatibility\": {
                  \"minimum\": \"13\",
                  \"verified\": \"13\"
                }
              }
            }")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Foundry VTT API returned HTTP $HTTP_CODE"
            exit 1
          fi
