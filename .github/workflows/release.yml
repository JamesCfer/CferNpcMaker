name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from module.json
        id: version
        run: echo "version=$(jq -r .version module.json)" >> $GITHUB_OUTPUT

      - name: Create module zip
        run: |
          zip -r Pf2eNpcMaker.zip \
            module.json \
            scripts/ \
            styles/ \
            templates/ \
            README.md

      - name: Create GitHub Release and upload assets
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { repo, owner } = context.repo;
            const version = '${{ steps.version.outputs.version }}';
            const tag = `v${version}`;

            let release;
            try {
              const res = await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag,
                name: tag,
                body: `Release ${tag}`,
                draft: false,
                prerelease: false,
              });
              release = res.data;
            } catch (e) {
              if (e.status === 422) {
                const list = await github.rest.repos.listReleases({ owner, repo });
                release = list.data.find(r => r.tag_name === tag);
                if (!release) throw new Error(`Tag ${tag} exists but release not found`);
                for (const asset of release.assets) {
                  await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
                }
              } else {
                throw e;
              }
            }

            await github.rest.repos.uploadReleaseAsset({
              owner, repo,
              release_id: release.id,
              name: 'module.json',
              data: fs.readFileSync('module.json'),
            });

            await github.rest.repos.uploadReleaseAsset({
              owner, repo,
              release_id: release.id,
              name: 'Pf2eNpcMaker.zip',
              data: fs.readFileSync('Pf2eNpcMaker.zip'),
            });

      # PF2E PACKAGE RELEASE
      - name: Notify Foundry PF2e Package
        env:
          FOUNDRYVTT_RELEASE_TOKEN: ${{ secrets.FOUNDRYVTT_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://foundryvtt.com/_api/packages/release_version/ \
            -H "Content-Type: application/json" \
            -H "Authorization: ${FOUNDRYVTT_RELEASE_TOKEN}" \
            -d "{
              \"id\": \"Pf2eNpcMaker\",
              \"dry-run\": false,
              \"release\": {
                \"version\": \"${VERSION}\",
                \"manifest\": \"https://github.com/JamesCfer/Pf2eNpcMaker/releases/download/v${VERSION}/module.json\",
                \"notes\": \"https://github.com/JamesCfer/Pf2eNpcMaker/releases/tag/v${VERSION}\",
                \"compatibility\": {
                  \"minimum\": \"13\",
                  \"verified\": \"13\"
                }
              }
            }")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Foundry VTT API returned HTTP $HTTP_CODE"
            exit 1
          fi

      # DND5E PACKAGE RELEASE
      - name: Notify Foundry DnD5e Package
        env:
          FOUNDRYVTT_DND5E_RELEASE_TOKEN: ${{ secrets.FOUNDRYVTT_DND5E_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://foundryvtt.com/_api/packages/release_version/ \
            -H "Content-Type: application/json" \
            -H "Authorization: ${FOUNDRYVTT_DND5E_RELEASE_TOKEN}" \
            -d "{
              \"id\": \"DnD5eNpcMaker\",
              \"dry-run\": false,
              \"release\": {
                \"version\": \"${VERSION}\",
                \"manifest\": \"https://github.com/JamesCfer/Pf2eNpcMaker/releases/download/v${VERSION}/module.json\",
                \"notes\": \"https://github.com/JamesCfer/Pf2eNpcMaker/releases/tag/v${VERSION}\",
                \"compatibility\": {
                  \"minimum\": \"13\",
                  \"verified\": \"13\"
                }
              }
            }")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Foundry VTT API returned HTTP $HTTP_CODE"
            exit 1
          fi
