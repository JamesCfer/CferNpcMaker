name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from module.json
        id: version
        run: echo "version=$(jq -r .version module.json)" >> $GITHUB_OUTPUT

      - name: Build module zips
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # --- DnD5eNpcMaker ---
          mkdir -p DnD5eNpcMaker
          jq --arg v "$VERSION" '
            .id = "DnD5eNpcMaker" |
            .title = "DnD 5e NPC Auto-Builder" |
            .description = "Generate D&D 5e NPCs from feats, spells, actions, and equipment. Optionally export them or upload via the Foundry REST API." |
            .systems = ["dnd5e"] |
            .manifest = "https://github.com/JamesCfer/CferNpcMaker/releases/download/dnd5e-v\($v)/module.json" |
            .download = "https://github.com/JamesCfer/CferNpcMaker/releases/download/dnd5e-v\($v)/DnD5eNpcMaker.zip"
          ' module.json > DnD5eNpcMaker/module.json
          cp -r scripts styles templates README.md DnD5eNpcMaker/
          zip -r DnD5eNpcMaker.zip DnD5eNpcMaker/

          # --- Pf2eNpcMaker ---
          mkdir -p Pf2eNpcMaker
          jq --arg v "$VERSION" '
            .id = "Pf2eNpcMaker" |
            .title = "PF2E NPC Auto-Builder" |
            .description = "Generate Pathfinder 2e NPCs from feats, spells, actions, and equipment. Optionally export them or upload via the Foundry REST API." |
            .systems = ["pf2e"] |
            .manifest = "https://github.com/JamesCfer/CferNpcMaker/releases/download/pf2e-v\($v)/module.json" |
            .download = "https://github.com/JamesCfer/CferNpcMaker/releases/download/pf2e-v\($v)/Pf2eNpcMaker.zip"
          ' module.json > Pf2eNpcMaker/module.json
          cp -r scripts styles templates README.md Pf2eNpcMaker/
          zip -r Pf2eNpcMaker.zip Pf2eNpcMaker/

          # --- Hero6NpcMaker ---
          mkdir -p Hero6NpcMaker
          jq --arg v "$VERSION" '
            .id = "Hero6NpcMaker" |
            .title = "Hero 6e NPC Auto-Builder" |
            .description = "Generate Hero System 6e NPCs from feats, spells, actions, and equipment. Optionally export them or upload via the Foundry REST API." |
            .systems = ["hero6e"] |
            .manifest = "https://github.com/JamesCfer/CferNpcMaker/releases/download/hero6-v\($v)/module.json" |
            .download = "https://github.com/JamesCfer/CferNpcMaker/releases/download/hero6-v\($v)/Hero6NpcMaker.zip"
          ' module.json > Hero6NpcMaker/module.json
          cp -r scripts styles templates README.md Hero6NpcMaker/
          zip -r Hero6NpcMaker.zip Hero6NpcMaker/

      - name: Create DnD5e Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { repo, owner } = context.repo;
            const version = '${{ steps.version.outputs.version }}';
            const tag = `dnd5e-v${version}`;

            let release;
            try {
              const res = await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag,
                name: `DnD5eNpcMaker v${version}`,
                body: `DnD5eNpcMaker release v${version}`,
                draft: false,
                prerelease: false,
              });
              release = res.data;
            } catch (e) {
              if (e.status === 422) {
                const list = await github.rest.repos.listReleases({ owner, repo });
                release = list.data.find(r => r.tag_name === tag);
                if (!release) throw new Error(`Tag ${tag} exists but release not found`);
                for (const asset of release.assets) {
                  await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
                }
              } else {
                throw e;
              }
            }

            for (const [name, path] of [['module.json', 'DnD5eNpcMaker/module.json'], ['DnD5eNpcMaker.zip', 'DnD5eNpcMaker.zip']]) {
              await github.rest.repos.uploadReleaseAsset({
                owner, repo,
                release_id: release.id,
                name,
                data: fs.readFileSync(path),
              });
            }

      - name: Create PF2e Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { repo, owner } = context.repo;
            const version = '${{ steps.version.outputs.version }}';
            const tag = `pf2e-v${version}`;

            let release;
            try {
              const res = await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag,
                name: `Pf2eNpcMaker v${version}`,
                body: `Pf2eNpcMaker release v${version}`,
                draft: false,
                prerelease: false,
              });
              release = res.data;
            } catch (e) {
              if (e.status === 422) {
                const list = await github.rest.repos.listReleases({ owner, repo });
                release = list.data.find(r => r.tag_name === tag);
                if (!release) throw new Error(`Tag ${tag} exists but release not found`);
                for (const asset of release.assets) {
                  await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
                }
              } else {
                throw e;
              }
            }

            for (const [name, path] of [['module.json', 'Pf2eNpcMaker/module.json'], ['Pf2eNpcMaker.zip', 'Pf2eNpcMaker.zip']]) {
              await github.rest.repos.uploadReleaseAsset({
                owner, repo,
                release_id: release.id,
                name,
                data: fs.readFileSync(path),
              });
            }

      - name: Create Hero6 Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { repo, owner } = context.repo;
            const version = '${{ steps.version.outputs.version }}';
            const tag = `hero6-v${version}`;

            let release;
            try {
              const res = await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag,
                name: `Hero6NpcMaker v${version}`,
                body: `Hero6NpcMaker release v${version}`,
                draft: false,
                prerelease: false,
              });
              release = res.data;
            } catch (e) {
              if (e.status === 422) {
                const list = await github.rest.repos.listReleases({ owner, repo });
                release = list.data.find(r => r.tag_name === tag);
                if (!release) throw new Error(`Tag ${tag} exists but release not found`);
                for (const asset of release.assets) {
                  await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
                }
              } else {
                throw e;
              }
            }

            for (const [name, path] of [['module.json', 'Hero6NpcMaker/module.json'], ['Hero6NpcMaker.zip', 'Hero6NpcMaker.zip']]) {
              await github.rest.repos.uploadReleaseAsset({
                owner, repo,
                release_id: release.id,
                name,
                data: fs.readFileSync(path),
              });
            }

      # PF2E PACKAGE RELEASE
      - name: Notify Foundry PF2e Package
        env:
          FOUNDRYVTT_RELEASE_TOKEN: ${{ secrets.FOUNDRYVTT_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://foundryvtt.com/_api/packages/release_version/ \
            -H "Content-Type: application/json" \
            -H "Authorization: ${FOUNDRYVTT_RELEASE_TOKEN}" \
            -d "{
              \"id\": \"Pf2eNpcMaker\",
              \"dry-run\": false,
              \"release\": {
                \"version\": \"${VERSION}\",
                \"manifest\": \"https://github.com/JamesCfer/CferNpcMaker/releases/download/pf2e-v${VERSION}/module.json\",
                \"notes\": \"https://github.com/JamesCfer/CferNpcMaker/releases/tag/pf2e-v${VERSION}\",
                \"compatibility\": {
                  \"minimum\": \"13\",
                  \"verified\": \"13\"
                }
              }
            }")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Foundry VTT API returned HTTP $HTTP_CODE"
            exit 1
          fi

      # DND5E PACKAGE RELEASE
      - name: Notify Foundry DnD5e Package
        env:
          FOUNDRYVTT_DND5E_RELEASE_TOKEN: ${{ secrets.FOUNDRYVTT_DND5E_RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://foundryvtt.com/_api/packages/release_version/ \
            -H "Content-Type: application/json" \
            -H "Authorization: ${FOUNDRYVTT_DND5E_RELEASE_TOKEN}" \
            -d "{
              \"id\": \"DnD5eNpcMaker\",
              \"dry-run\": false,
              \"release\": {
                \"version\": \"${VERSION}\",
                \"manifest\": \"https://github.com/JamesCfer/CferNpcMaker/releases/download/dnd5e-v${VERSION}/module.json\",
                \"notes\": \"https://github.com/JamesCfer/CferNpcMaker/releases/tag/dnd5e-v${VERSION}\",
                \"compatibility\": {
                  \"minimum\": \"13\",
                  \"verified\": \"13\"
                }
              }
            }")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Foundry VTT API returned HTTP $HTTP_CODE"
            exit 1
          fi
